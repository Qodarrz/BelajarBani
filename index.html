<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untukmu, Sayang</title>
    <!-- Google Fonts for beautiful typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Container for the background floating hearts -->
    <div id="heart-container"></div>

    <!-- Main glassmorphism card -->
    <div class="glass-card" id="main-card">
        <h1 class="title">Halo, Sayang... ❤️</h1>
        <p class="subtitle">Ada sesuatu yang ingin aku sampaikan.</p>

        <button id="reveal-btn" class="btn">Buka Pesan</button>

        <!-- The secret message hidden initially -->
        <div id="secret-message" class="hidden">
            <p>Terima kasih ya sudah selalu ada dan bertahan sama aku.</p>
            <p>Kamu adalah bagian terbaik dari hari-hariku, alasanku tersenyum, dan tempat ternyaman untukku pulang.</p>
            <p>Aku sayang banget sama kamu. 💕</p>
        </div>
    </div>

    <script src="animasi.js"></script>
</body>

</html>
